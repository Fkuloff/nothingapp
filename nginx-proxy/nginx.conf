# Nginx reverse proxy configuration with SSL
# Domain: nothingapp.ru

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml application/xml+rss;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # Use Docker DNS resolver with short cache TTL
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # HTTP -> HTTPS redirect
    server {
        listen 80;
        listen [::]:80;
        server_name nothingapp.ru www.nothingapp.ru minio.nothingapp.ru minio-console.nothingapp.ru;

        # Certbot challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # Main site - nothingapp.ru
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name nothingapp.ru www.nothingapp.ru;

        ssl_certificate /etc/letsencrypt/live/nothingapp.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/nothingapp.ru/privkey.pem;

        # HSTS
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # WWW -> non-WWW redirect
        if ($host = www.nothingapp.ru) {
            return 301 https://nothingapp.ru$request_uri;
        }

        # Rate limiting
        limit_req zone=general burst=20 nodelay;

        # Max upload size
        client_max_body_size 500M;

        # Proxy to frontend (using variable for dynamic DNS resolution)
        location / {
            set $frontend_upstream http://frontend:80;
            proxy_pass $frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # WebSocket support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
    }

    # MinIO API - minio.nothingapp.ru (for public file access)
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name minio.nothingapp.ru;

        ssl_certificate /etc/letsencrypt/live/nothingapp.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/nothingapp.ru/privkey.pem;

        # Ignore invalid headers from MinIO
        ignore_invalid_headers off;
        # Allow special characters in headers
        client_max_body_size 500M;
        # Disable buffering
        proxy_buffering off;
        proxy_request_buffering off;

        location / {
            # CORS headers for direct browser access to attachments
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range" always;

            if ($request_method = 'OPTIONS') {
                return 204;
            }

            set $minio_upstream http://minio:9000;
            proxy_pass $minio_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 300;
            proxy_send_timeout 300;
            proxy_read_timeout 300;
            # Health check timeouts
            chunked_transfer_encoding off;
        }
    }

    # MinIO Console - minio-console.nothingapp.ru
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name minio-console.nothingapp.ru;

        ssl_certificate /etc/letsencrypt/live/nothingapp.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/nothingapp.ru/privkey.pem;

        # Ignore invalid headers
        ignore_invalid_headers off;
        client_max_body_size 500M;
        proxy_buffering off;
        proxy_request_buffering off;

        location / {
            set $minio_console_upstream http://minio:9001;
            proxy_pass $minio_console_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 300;
            # WebSocket support for console
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}

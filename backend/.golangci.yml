# golangci-lint balanced configuration for production Go code
# Focuses on real bugs and maintainability without excessive pedantry
run:
  timeout: 5m
  tests: true

linters:
  enable:
    # Core linters (must-have for correctness)
    - errcheck      # Check for unchecked errors
    - gosimple      # Simplify code
    - govet         # Reports suspicious constructs
    - ineffassign   # Detect ineffectual assignments
    - staticcheck   # Go static analysis (comprehensive)
    - unused        # Check for unused code
    - typecheck     # Type-check Go code

    # Formatting (auto-fixable)
    - gofmt         # Check code formatting
    - goimports     # Check imports formatting

    # Security (critical)
    - gosec         # Security issues (G101-G602)
    - bidichk       # Dangerous unicode characters

    # Error handling (important for debugging)
    - errorlint     # Proper error wrapping with %w and errors.Is/As
    - nilerr        # Returns nil error when should return actual error
    - nilnil        # Prohibits returning (nil, nil)

    # Code quality (finds real issues)
    - gocritic      # Meta-linter with 100+ checks
    - goconst       # Repeated strings that could be constants
    - gocyclo       # Cyclomatic complexity
    - gocognit      # Cognitive complexity
    - nestif        # Deeply nested if statements
    - dupl          # Code duplication
    - unconvert     # Unnecessary type conversions
    - wastedassign  # Wasted assignments
    - predeclared   # Shadowing predeclared identifiers

    # Best practices
    - contextcheck  # Context propagation check
    - bodyclose     # HTTP response body close check
    - errname       # Error types should end with Error
    - makezero      # Finds slice declarations with non-zero length and append
    - nakedret      # Naked returns in long functions
    - durationcheck # Check for time.Duration multiplications
    - nosprintfhostport # sprintf for host:port

    # Complexity limits
    - funlen        # Function length (reasonable limits)

    # Style (minimal, important rules only)
    - misspell      # Spelling mistakes
    - stylecheck    # Official style checker (limited rules)
    - revive        # Configurable linter (selective rules)

  disable:
    # Disabled: too pedantic or noisy
    - godot         # Comments must end with period (too pedantic)
    - wrapcheck     # Wrap all external errors (too noisy for handlers)
    - musttag       # Enforce struct tags (too strict)
    - forcetypeassert # Type assertions without ok (common in trusted code)
    - noctx         # HTTP requests without context (Gin handles this)
    - unparam       # Unused parameters (useful for interface consistency)
    - prealloc      # Slice preallocation (micro-optimization)
    - usestdlibvars # Use stdlib constants (too opinionated)
    - mirror        # Wrong mirror usage (rare issue)
    - maintidx      # Maintainability index (funlen is enough)

    # Disabled: conflicts with Go idioms
    - exhaustive    # Exhaustive switch (too strict)
    - exhaustruct   # Exhaustive struct initialization (too strict)
    - nlreturn      # Newline before return (opinionated)
    - wsl           # Whitespace linter (too opinionated)
    - lll           # Line length (gofumpt handles this)
    - varnamelen    # Variable name length (annoying for i, j, k)
    - tagliatelle   # Struct tag formatting (conflicts with GORM)
    - ireturn       # Return interfaces (conflicts with patterns)
    - forbidigo     # Forbid identifiers (too restrictive)
    - cyclop        # Duplicate of gocyclo
    - interfacebloat # Interface size (not useful)
    - testpackage   # Tests in separate package (not always needed)
    - paralleltest  # Require t.Parallel (not always safe)
    - thelper       # Test helpers (too opinionated)
    - tenv          # t.Setenv (not critical)
    - nonamedreturns # Named returns (useful for docs)

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
    exclude-functions:
      - (io.Closer).Close
      - (*database/sql.Rows).Close
      - (*go.uber.org/zap.Logger).Sync

  govet:
    enable-all: true
    disable:
      - fieldalignment  # Micro-optimization, can enable later
    settings:
      shadow:
        strict: true  # Strict shadowing checks

  # Cyclomatic complexity (strict: 15)
  gocyclo:
    min-complexity: 15

  # Cognitive complexity (strict: 20)
  gocognit:
    min-complexity: 20

  # Code duplication (reasonable for REST handlers: 90 tokens)
  dupl:
    threshold: 90

  # Nested if depth (strict: 4)
  nestif:
    min-complexity: 4

  # Repeated strings
  goconst:
    min-len: 3
    min-occurrences: 3
    ignore-tests: true

  # Naked returns (strict: 20 lines)
  nakedret:
    max-func-lines: 20

  # Function length (reasonable limits)
  funlen:
    lines: 120            # Maximum lines per function
    statements: 70        # Maximum statements per function
    ignore-comments: true

  # Spelling
  misspell:
    locale: US
    ignore-words:
      - marshalling
      - unmarshalling

  # Error wrapping (strict - this is important!)
  errorlint:
    errorf: true
    errorf-multi: true
    asserts: true
    comparison: true

  # Error naming
  errname:
    check-type-assertions: true

  # Style check (minimal rules)
  stylecheck:
    checks: ["all", "-ST1000", "-ST1003", "-ST1016", "-ST1020", "-ST1021", "-ST1022"]
    http-status-code-whitelist: ["200", "400", "404", "500"]

  # Revive rules (selective, important only)
  revive:
    severity: warning
    confidence: 0.8
    rules:
      # Disabled: too strict or not applicable
      - name: exported
        disabled: true
      - name: package-comments
        disabled: true
      - name: line-length-limit
        disabled: true
      - name: get-return  # Disabled: conflicts with Gin handlers
        disabled: true
      - name: unused-parameter  # Disabled: useful for interface consistency
        disabled: true

      # Naming rules (important)
      - name: var-naming
        arguments:
          - ["ID", "URL", "API", "DB", "JWT", "WS", "HTTP", "HTTPS", "JSON", "XML", "HTML", "CSS", "SQL", "UUID", "URI", "CORS", "CSRF", "OAuth", "UID", "GID"]
      - name: receiver-naming
      - name: error-naming
      - name: error-return
      - name: error-strings

      # Best practices (essential only)
      - name: context-as-argument
        arguments:
          - allowTypesBefore: "*testing.T,*github.com/stretchr/testify/suite.Suite"
      - name: context-keys-type
      - name: time-naming
      - name: increment-decrement
      - name: var-declaration
      - name: range
      - name: indent-error-flow
        arguments:
          - "preserveScope"
      - name: blank-imports
      - name: defer
        arguments:
          - ["call-chain", "loop", "method-call", "recover", "immediate-recover", "return"]
      - name: superfluous-else
      - name: unreachable-code
      - name: redefines-builtin-id
      - name: constant-logical-expr
      - name: bool-literal-in-expr
      - name: range-val-in-closure
      - name: range-val-address
      - name: waitgroup-by-value
      - name: atomic
      - name: empty-lines
      - name: early-return
      - name: unconditional-recursion
      - name: identical-branches

  # Gocritic checks (balanced)
  gocritic:
    enabled-tags:
      - diagnostic    # Bug detection
      - style         # Style issues
      - performance   # Performance issues
    disabled-checks:
      - hugeParam        # Too strict for structs
      - rangeValCopy     # Conflicts with readability
      - unnamedResult    # Named returns are useful
      - whyNoLint        # Annoying
      - ifElseChain      # Switch is not always better
      - singleCaseSwitch # Sometimes clearer than if
      - commentFormatting # Too opinionated
      - unnecessaryBlock  # Gin route groups use blocks for clarity
    settings:
      captLocal:
        paramsOnly: false
      underef:
        skipRecvDeref: false

  # Security checks (important!)
  gosec:
    severity: medium
    confidence: medium
    excludes:
      - G404  # Weak random number generator (math/rand) - OK for non-crypto use
      - G601  # Implicit memory aliasing (fixed in Go 1.22+)
    config:
      G301: "0750"  # Directory permissions
      G302: "0640"  # File permissions
      G306: "0640"  # WriteFile permissions

issues:
  # Balanced mode: show real issues, hide noise
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: true

  exclude-dirs:
    - vendor
    - third_party
    - docs
    - .git
    - .github

  exclude-files:
    - ".*\\.pb\\.go$"    # Protobuf generated files
    - ".*\\.gen\\.go$"   # Generated files
    - ".*_mock\\.go$"    # Mock files

  exclude-rules:
    # Test files: relax checks
    - path: _test\.go
      linters:
        - gocyclo
        - gocognit
        - dupl
        - goconst
        - bodyclose
        - errcheck

    # Generated mocks
    - path: mock_.*\.go
      linters:
        - stylecheck
        - revive
        - unused

    # Migration tool: allow some complexity (CLI utility)
    - path: cmd/migrate/
      linters:
        - gocyclo
        - gocognit
        - nestif
        - errorlint  # Old migration code, not critical
        - gocritic   # CLI tool with different patterns

    # Main functions: often have initialization complexity
    - path: cmd/.*/main\.go
      linters:
        - gocyclo
        - gocognit

    # Models: allow gorm-specific patterns
    - path: internal/models/
      linters:
        - gochecknoglobals
        - gochecknoinits

    # Handlers: allow reasonable complexity for orchestration
    - path: internal/handlers/
      text: "(cyclomatic|cognitive) complexity"
      linters:
        - gocyclo
        - gocognit

    # Setup functions naturally have many statements
    - path: internal/app/app\.go
      linters:
        - gocyclo
        - gocognit
    - text: "Function 'SetupRoutes' has too many statements"
      linters:
        - funlen
    - path: internal/handlers/routes\.go
      linters:
        - gocyclo

    # WebSocket: inherently complex real-time logic
    - path: internal/handlers/websocket.*\.go
      linters:
        - gocyclo
        - gocognit

    # Background cleanup tasks have necessary nested logic
    - text: "cognitive complexity .* of func `.*cleanupInactiveUsers`"
      linters:
        - gocognit

    # Allow shadowing 'err' (idiomatic Go)
    - text: 'shadow: declaration of "err" shadows'
      linters:
        - govet

    # Allow some common error handling patterns
    - text: "Error return value of .*(Close|Sync|Flush). is not checked"
      linters:
        - errcheck

    # Exclude octal literal warnings for file permissions (0600 is clearer than 0o600)
    - text: "octalLiteral: use new octal literal style"
      path: cmd/migrate/
      linters:
        - gocritic

    # Allow ST1003 violations for database field names
    - text: "ST1003: should not use underscores in Go names"
      linters:
        - stylecheck

severity:
  default-severity: warning
  case-sensitive: false
  rules:
    # Critical linters that should fail builds
    - linters:
        - errcheck
        - gosec
        - govet
        - staticcheck
        - nilnil
        - nilerr
      severity: error

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true
  show-stats: true

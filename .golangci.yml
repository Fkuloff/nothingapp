# golangci-lint configuration for Uber Go Style Guide compliance
run:
  timeout: 5m
  tests: true

linters:
  enable:
    # Uber Style Guide recommendations
    - errcheck      # Check for unchecked errors
    - gosimple      # Simplify code
    - govet         # Reports suspicious constructs
    - ineffassign   # Detect ineffectual assignments
    - staticcheck   # Go static analysis
    - unused        # Check for unused code
    - typecheck     # Type-check Go code

    # Additional best practices
    - gofmt         # Check code formatting
    - goimports     # Check imports formatting
    - misspell      # Spelling mistakes
    - revive        # Replacement for golint
    - gosec         # Security issues
    - goconst       # Repeated strings that could be constants
    - gocyclo       # Cyclomatic complexity
    - dupl          # Code duplication
    - unparam       # Unused function parameters
    - nakedret      # Naked returns in long functions
    - prealloc      # Slice preallocation
    - noctx         # HTTP requests without context
    - bodyclose     # HTTP response body close check
    - contextcheck  # Context propagation check

  disable:
    - exhaustive    # Too strict for switches
    - exhaustruct   # Too strict for struct initialization
    - nlreturn      # Conflicts with team preferences
    - wsl           # Too opinionated on whitespace

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
    exclude-functions:
      - (io.Closer).Close
      - (*database/sql.Rows).Close
      - (*go.uber.org/zap.Logger).Sync

  govet:
    enable:
      - shadow      # Report shadowed variables (Uber recommendation)
      - fieldalignment

  gocyclo:
    min-complexity: 20  # Allow reasonable complexity for handlers

  dupl:
    threshold: 100

  goconst:
    min-len: 3
    min-occurrences: 3

  misspell:
    locale: US

  nakedret:
    max-func-lines: 30

  unparam:
    check-exported: false

  revive:
    rules:
      - name: exported
        disabled: true
      - name: package-comments
        disabled: true
      - name: var-naming
        arguments:
          - ["ID", "URL", "API", "DB", "JWT", "WS", "HTTP"]
      - name: context-as-argument
        arguments:
          - allowTypesBefore: "*testing.T"
      - name: error-naming
      - name: error-return
      - name: error-strings
      - name: increment-decrement
      - name: var-declaration
      - name: range
      - name: receiver-naming
      - name: indent-error-flow
      - name: blank-imports
      - name: time-naming
      - name: context-keys-type
      - name: defer
        arguments:
          - ["call-chain", "loop", "method-call", "recover", "immediate-recover", "return"]

  gosec:
    excludes:
      - G404  # Weak random number generator (math/rand) - OK for non-crypto use

  noctx:
    http-method:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "PATCH"

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: true

  exclude-dirs:
    - vendor
    - docs

  exclude-files:
    - ".*_test.go$"

  exclude-rules:
    # Exclude some linters from running on test files
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - dupl
        - gosec
        - goconst

    # Ignore long lines with go:generate
    - linters:
        - lll
      source: "^//go:generate "

    # Allow prealloc warnings (minor performance optimization)
    - text: "Consider pre-allocating"
      linters:
        - prealloc

    # Allow reasonable complexity for WebSocket and JWT handlers
    - text: "cyclomatic complexity .* of func `.*JWTMiddleware`"
      linters:
        - gocyclo

    - text: "cyclomatic complexity .* of func `.*HandleWebSocket`"
      linters:
        - gocyclo

    # Allow unused parameter for API consistency
    - text: "`sendForbidden` - `message` always receives"
      linters:
        - unparam

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true

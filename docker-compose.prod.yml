# Production Docker Compose configuration with HTTPS (Nginx + Certbot)
# Domain: nothingapp.ru
#
# Secrets layout (see ops/SECRETS.md for setup):
#   /etc/messenger/secrets/postgres_password         640 root:docker
#   /etc/messenger/secrets/minio_root_password       640 root:docker
#   /etc/messenger/secrets/jwt_secret                640 root:docker
#   /etc/messenger/secrets/vapid_private_key         640 root:docker
#   /etc/messenger/secrets/db_url                    640 root:docker
#   /etc/messenger/secrets/fcm_credentials.json      640 root:docker
#
# Containers see these mounted at /run/secrets/<name>. The corresponding *_FILE
# env vars below tell each service to read from those paths instead of from the
# plain *_VALUE env vars (which are no longer set in .env).
#
# First-time setup:
#   1. Populate /etc/messenger/secrets/ per ops/SECRETS.md
#   2. Set non-sensitive vars in .env (POSTGRES_USER, ALLOWED_ORIGINS, REGISTRY, TAG, etc.)
#   3. Run: chmod +x init-letsencrypt.sh && ./init-letsencrypt.sh
#   4. Run: docker compose -f docker-compose.prod.yml up -d

secrets:
  postgres_password:
    file: /etc/messenger/secrets/postgres_password
  minio_root_password:
    file: /etc/messenger/secrets/minio_root_password
  jwt_secret:
    file: /etc/messenger/secrets/jwt_secret
  vapid_private_key:
    file: /etc/messenger/secrets/vapid_private_key
  db_url:
    file: /etc/messenger/secrets/db_url
  fcm_credentials:
    file: /etc/messenger/secrets/fcm_credentials.json

services:
  # Nginx Reverse Proxy with SSL
  nginx-proxy:
    image: nginx:alpine
    container_name: messenger-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      frontend:
        condition: service_healthy
        required: false
    networks:
      - messenger-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Certbot for SSL certificate renewal
  certbot:
    image: certbot/certbot
    container_name: messenger-certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - messenger-network
    # Check for renewal every 12 hours
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: messenger-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-messenger}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: ${POSTGRES_DB:-messenger}
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - messenger-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-messenger} -d ${POSTGRES_DB:-messenger}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO S3-Compatible Object Storage
  # Accessed via nginx-proxy, no direct port exposure
  minio:
    image: minio/minio:latest
    container_name: messenger-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_CONSOLE_URL:-https://minio-console.nothingapp.ru}
    secrets:
      - minio_root_password
    volumes:
      - minio_data:/data
    networks:
      - messenger-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Init - creates bucket automatically
  minio-init:
    image: minio/mc:latest
    container_name: messenger-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-messenger-uploads}
    secrets:
      - minio_root_password
    networks:
      - messenger-network
    # Password comes from the mounted secret file, not from env (so it stays off
    # `docker inspect` output and the host's process listing).
    entrypoint: >
      /bin/sh -c "
      PASSWORD=$$(cat /run/secrets/minio_root_password);
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $$PASSWORD;
      mc mb local/$${MINIO_BUCKET_NAME} --ignore-existing;
      exit 0;
      "

  # Go Backend API
  backend:
    image: ${REGISTRY:-ghcr.io/your-username/messenger-}backend:${TAG:-latest}
    container_name: messenger-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    secrets:
      - jwt_secret
      - vapid_private_key
      - minio_root_password
      - db_url
      - fcm_credentials
    environment:
      # Backend reads sensitive values from mounted secret files via the *_FILE
      # convention (see internal/secret/secret.go). The plain *_VALUE env vars are
      # not set, so `docker inspect messenger-backend` does not leak them either.
      DB_URL_FILE: /run/secrets/db_url
      JWT_SECRET_FILE: /run/secrets/jwt_secret
      VAPID_PRIVATE_KEY_FILE: /run/secrets/vapid_private_key
      STORAGE_S3_SECRET_KEY_FILE: /run/secrets/minio_root_password
      FCM_CREDENTIALS_PATH: /run/secrets/fcm_credentials

      PORT: 8080
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://nothingapp.ru,https://www.nothingapp.ru}
      # S3/MinIO configuration — non-sensitive
      STORAGE_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT:-http://minio:9000}
      STORAGE_S3_PUBLIC_ENDPOINT: ${STORAGE_S3_PUBLIC_ENDPOINT:-https://minio.nothingapp.ru}
      STORAGE_S3_BUCKET: ${STORAGE_S3_BUCKET:-messenger-uploads}
      STORAGE_S3_REGION: ${STORAGE_S3_REGION:-us-east-1}
      STORAGE_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      STORAGE_S3_USE_SSL: ${STORAGE_S3_USE_SSL:-false}
      STORAGE_S3_PRESIGNED_EXPIRY: ${STORAGE_S3_PRESIGNED_EXPIRY:-3600}
      # VAPID public key — public by definition, fine in env
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
    networks:
      - messenger-network
    healthcheck:
      test: ["CMD", "/app/messenger", "-health"]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 5

  # Nginx Frontend
  frontend:
    image: ${REGISTRY:-ghcr.io/your-username/messenger-}frontend:${TAG:-latest}
    container_name: messenger-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - messenger-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local

networks:
  messenger-network:
    driver: bridge

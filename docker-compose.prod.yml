# Production Docker Compose configuration with HTTPS (Nginx + Certbot)
# Domain: nothingapp.ru
#
# First-time setup:
#   1. Set required environment variables in .env file
#   2. Run: chmod +x init-letsencrypt.sh && ./init-letsencrypt.sh
#   3. Run: docker compose -f docker-compose.prod.yml up -d

services:
  # Nginx Reverse Proxy with SSL
  nginx-proxy:
    image: nginx:alpine
    container_name: messenger-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      frontend:
        condition: service_healthy
        required: false
    networks:
      - messenger-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Certbot for SSL certificate renewal
  certbot:
    image: certbot/certbot
    container_name: messenger-certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - messenger-network
    # Check for renewal every 12 hours
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: messenger-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-messenger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-messenger}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - messenger-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-messenger} -d ${POSTGRES_DB:-messenger}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO S3-Compatible Object Storage
  # Accessed via nginx-proxy, no direct port exposure
  minio:
    image: minio/minio:latest
    container_name: messenger-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_CONSOLE_URL:-https://minio-console.nothingapp.ru}
    volumes:
      - minio_data:/data
    networks:
      - messenger-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Init - creates bucket automatically
  minio-init:
    image: minio/mc:latest
    container_name: messenger-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-messenger-uploads}
    networks:
      - messenger-network
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb local/$${MINIO_BUCKET_NAME} --ignore-existing;
      exit 0;
      "

  # Go Backend API
  backend:
    image: ${REGISTRY:-ghcr.io/your-username/messenger-}backend:${TAG:-latest}
    container_name: messenger-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DB_URL: postgres://${POSTGRES_USER:-messenger}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-messenger}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required (min 32 chars)}
      PORT: 8080
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://nothingapp.ru,https://www.nothingapp.ru}
      # S3/MinIO configuration
      STORAGE_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT:-http://minio:9000}
      STORAGE_S3_PUBLIC_ENDPOINT: ${STORAGE_S3_PUBLIC_ENDPOINT:-https://minio.nothingapp.ru}
      STORAGE_S3_BUCKET: ${STORAGE_S3_BUCKET:-messenger-uploads}
      STORAGE_S3_REGION: ${STORAGE_S3_REGION:-us-east-1}
      STORAGE_S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      STORAGE_S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      STORAGE_S3_USE_SSL: ${STORAGE_S3_USE_SSL:-false}
      STORAGE_S3_PRESIGNED_EXPIRY: ${STORAGE_S3_PRESIGNED_EXPIRY:-3600}
      # Message encryption at rest (AES-256-GCM)
      MESSAGE_ENCRYPTION_KEY: ${MESSAGE_ENCRYPTION_KEY:?MESSAGE_ENCRYPTION_KEY is required (base64 32 bytes)}
      # VAPID keys for Web Push Notifications (web)
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
      # FCM service account credentials (mobile push) — JSON file mounted below
      FCM_CREDENTIALS_PATH: ${FCM_CREDENTIALS_PATH:-/app/fcm-credentials.json}
    volumes:
      - ./fcm-credentials.json:/app/fcm-credentials.json:ro
    networks:
      - messenger-network
    healthcheck:
      test: ["CMD", "/app/messenger", "-health"]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 5

  # Nginx Frontend
  frontend:
    image: ${REGISTRY:-ghcr.io/your-username/messenger-}frontend:${TAG:-latest}
    container_name: messenger-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - messenger-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local

networks:
  messenger-network:
    driver: bridge

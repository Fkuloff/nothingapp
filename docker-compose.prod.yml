# Production Docker Compose configuration
# Uses pre-built images from GitHub Container Registry

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: messenger-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-messenger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-messenger}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - messenger-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-messenger} -d ${POSTGRES_DB:-messenger}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Go Backend API (using pre-built image from GHCR)
  backend:
    image: ${REGISTRY:-ghcr.io/your-username/messenger-}backend:${TAG:-latest}
    container_name: messenger-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: postgres://${POSTGRES_USER:-messenger}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-messenger}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required (min 32 chars)}
      PORT: 8080
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: /app/uploads
      STORAGE_LOCAL_URL: ${STORAGE_LOCAL_URL:-http://localhost/uploads}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - messenger-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Nginx Frontend (using pre-built image from GHCR)
  frontend:
    image: ${REGISTRY:-ghcr.io/your-username/messenger-}frontend:${TAG:-latest}
    container_name: messenger-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${PORT:-80}:80"
    networks:
      - messenger-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local

networks:
  messenger-network:
    driver: bridge
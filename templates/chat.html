<!-- templates/chat.html -->
{{ define "chat_content" }}
<h2>Chat</h2>
<div id="messages" class="border p-3 mb-3" style="height: 300px; overflow-y: scroll;">
    {{ range .Messages }}
    <p><strong>{{ if eq $.UserID .UserID }}You{{ else }}Other{{ end }}:</strong> {{ .Text }}</p>
    {{ end }}
</div>
<form id="chat-form">
    <div class="input-group">
        <input type="text" id="message" class="form-control" placeholder="Type a message..." required>
        <button type="submit" class="btn btn-primary">Send</button>
    </div>
</form>
<script src="/static/js/chat.js"></script>
<script>
    initChat({{ .ChatID }}, {{ .UserID }});
</script>
{{ end }}

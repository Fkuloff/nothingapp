<!-- templates/register.html -->
{{ define "register_content" }}
<h2>Register</h2>
{{ if .error }}
<div class="alert alert-danger">{{ .error }}</div>
{{ end }}
<form method="POST" action="/register">
    <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" name="username" required minlength="3" maxlength="20">
    </div>
    <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password" required minlength="6">
    </div>
    <div class="mb-3">
        <label for="name" class="form-label">Full Name</label>
        <input type="text" class="form-control" id="name" name="name" required minlength="2" maxlength="50">
    </div>
    <div class="mb-3">
        <label for="phone" class="form-label">Phone Number (e.g., +79123456789)</label>
        <input type="tel" class="form-control" id="phone" name="phone" required pattern="^\+?[1-9]\d{1,14}$">
    </div>
    <button type="submit" class="btn btn-primary">Register</button>
</form>
{{ end }}

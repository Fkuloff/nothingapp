<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{if .Title}}{{.Title}}{{else}}Messenger{{end}}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
        <a class="navbar-brand" href="/chats?user_id={{ .UserID }}">Messenger</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="/logout">Logout</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<div class="container mt-4">
    {{ if eq .Page "register" }}
    {{ template "register_content" . }}
    {{ else if eq .Page "login" }}
    {{ template "login_content" . }}
    {{ else if eq .Page "chats" }}
    {{ template "chats_content" . }}
    {{ else if eq .Page "chat" }}
    {{ template "chat_content" . }}
    {{ end }}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
